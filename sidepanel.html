<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --accent: #ff5500;
    --fg: #f2f2f2;
    --dim: #9a9a9a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #0d0d0d;
    color: var(--fg);
    font: 13px/1.5 system-ui, sans-serif;
    overflow: hidden;
  }

  /* Animated hexdump backdrop and a scrim to keep the UI legible over it. */
  #bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .scrim {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(130% 70% at 50% 34%, transparent 0%, rgba(8, 8, 8, 0.72) 100%),
      linear-gradient(180deg, rgba(8, 8, 8, 0.55) 0%, transparent 22%, transparent 62%, rgba(8, 8, 8, 0.7) 100%);
  }

  /* The real player lives here; the SoundCloud widget is kept offscreen. */
  .app {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 16px 18px 18px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  h1 {
    font: 600 11px/1 system-ui, sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0;
  }
  #status { color: var(--dim); font-size: 11px; }

  .art-wrap {
    margin: 10px auto 4px;
    width: min(72vw, 240px);
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 46px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
    background: #1a1a1a;
  }
  #art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .meta { text-align: center; margin: 14px 4px 2px; min-height: 44px; }
  #title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  #artist { color: var(--dim); font-size: 13px; margin-top: 2px; }

  /* Progress bar with click-to-seek. */
  .progress { margin: 16px 2px 4px; }
  #bar {
    position: relative;
    height: 5px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.14);
    cursor: pointer;
  }
  #fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    border-radius: 3px;
    background: var(--accent);
  }
  #fill::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    width: 10px; height: 10px;
    border-radius: 50%;
    transform: translateY(-50%);
    background: #fff;
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
  }
  .times {
    display: flex;
    justify-content: space-between;
    color: var(--dim);
    font-size: 11px;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* Transport controls. */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    margin: 14px 0 6px;
  }
  .ctl {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 0;
    color: var(--fg);
    cursor: pointer;
    padding: 0;
  }
  .ctl svg { width: 26px; height: 26px; fill: currentColor; }
  .ctl:hover { color: #fff; }
  #play {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 22px rgba(255, 85, 0, 0.4);
  }
  #play svg { width: 28px; height: 28px; }
  #play .icon-pause { display: none; }
  #play.is-playing .icon-play { display: none; }
  #play.is-playing .icon-pause { display: block; }

  .secondary { display: flex; gap: 8px; margin-top: auto; }
  .secondary button {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    color: var(--fg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 9px 0;
    font: 600 12px system-ui, sans-serif;
    cursor: pointer;
  }
  .secondary button:hover { background: rgba(255, 255, 255, 0.12); }

  #log {
    margin-top: 10px;
    font-size: 10px;
    line-height: 1.4;
    color: #6a6a6a;
    max-height: 46px;
    overflow-y: auto;
    white-space: pre-wrap;
  }

  /* Kept in the DOM and rendered so audio plays, but never shown: our own
     controls above drive it. Hiding it entirely can suspend playback. */
  .embed {
    position: fixed;
    left: 0; bottom: 0;
    width: 100%;
    height: 120px;
    opacity: 0;
    pointer-events: none;
    z-index: -1;
  }
  .embed iframe { width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="scrim"></div>

  <div class="app">
    <header>
      <h1>True Shuffle</h1>
      <span id="status">starting</span>
    </header>

    <div class="art-wrap"><img id="art" alt=""></div>

    <div class="meta">
      <div id="title"></div>
      <div id="artist"></div>
    </div>

    <div class="progress">
      <div id="bar"><i id="fill"></i></div>
      <div class="times">
        <span id="cur">0:00</span>
        <span id="dur">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button id="prev" class="ctl" title="previous" aria-label="previous">
        <svg viewBox="0 0 24 24"><path d="M7 6h2v12H7z"/><path d="M20 6v12l-9-6z"/></svg>
      </button>
      <button id="play" class="ctl" title="play/pause" aria-label="play/pause">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button id="next" class="ctl" title="next" aria-label="next">
        <svg viewBox="0 0 24 24"><path d="M15 6h2v12h-2z"/><path d="M4 6l9 6-9 6z"/></svg>
      </button>
    </div>

    <div class="secondary">
      <button id="reshuffle">reshuffle</button>
      <button id="refetch">refetch likes</button>
    </div>

    <div id="log"></div>
  </div>

  <div class="embed">
    <iframe id="widget" allow="autoplay"
            src="https://w.soundcloud.com/player/?url="></iframe>
  </div>

  <script src="ascii-bg.js"></script>
  <script src="vendor/sc-widget-api.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
